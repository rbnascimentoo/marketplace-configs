spring:
  config:
    activate:
      on-profile: dev
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_GIT_URI:file:./marketplace-configs}
          default-label: ${CONFIG_GIT_BRANCH:work}
          clone-on-start: true
          timeout: 5
logging:
  level:
    root: INFO
    org.springframework.cloud.config: DEBUG
