spring:
  main:
    banner-mode: "off"
  jackson:
    property-naming-strategy: SNAKE_CASE
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  cloud:
    config:
      allow-override: true
#      override-none: true
      override-system-properties: false
  threads:
    virtual:
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      roles: ADMIN
    prometheus:
      access: read_only
  metrics:
    tags:
      application: marketplace
logging:
  level:
    root: INFO
    org.springframework.security: WARN
    org.springframework.web: INFO
resilience4j:
  timelimiter:
    configs:
      default:
        timeoutDuration: 3s
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 50
        minimumNumberOfCalls: 10
        slowCallRateThreshold: 60
        slowCallDurationThreshold: 2s
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5
        timeoutDuration: 3s
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
springdoc:
  swagger-ui:
    enabled: false
    tags-sorter: alpha
  api-docs:
    enabled: false
