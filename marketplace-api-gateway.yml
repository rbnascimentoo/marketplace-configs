server:
  port: 8080
spring:
  application:
    name: marketplace-api-gateway
  main:
    web-application-type: reactive
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI}
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@remoteAddressResolver}'
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET,POST
          routes:
            - id: auth-service
              uri: http://auth-service:8080
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
            - id: user-service
              uri: http://user-service:8080
              predicates:
                - Path=/users/**
              filters:
                - StripPrefix=1
            - id: product-service
              uri: http://product-service:8080
              predicates:
                - Path=/products/**
              filters:
                - StripPrefix=1
            - id: order-service
              uri: http://order-service:8080
              predicates:
                - Path=/orders/**
              filters:
                - StripPrefix=1
            - id: payment-service
              uri: http://payment-service:8080
              predicates:
                - Path=/payments/**
              filters:
                - StripPrefix=1
            - id: notification-service
              uri: http://notification-service:8080
              predicates:
                - Path=/notifications/**
              filters:
                - StripPrefix=1
          httpclient:
            connect-timeout: 5000
            response-timeout: 10s
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_JWT_ISSUER_URI:http://keycloak:9090/realms/marketplace}
  data:
    redis:
      host: redis
      port: 6379
      timeout: 6000
management:
  endpoint:
    gateway:
      access: read_only
    health:
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  metrics:
    tags:
      application: marketplace-api-gateway
logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: DEBUG
rate-limiter:
  redis:
    enabled: true
