server:
  port: 8080
spring:
  application:
    name: marketplace-api-gateway
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            key-resolver: '#{@remoteAddressResolver}'
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200
        - name: Retry
          args:
            retries: 2
            statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
            methods: GET,POST
      routes:
        - id: marketplace-auth-service
          uri: lb://marketplace-auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: marketplace-user-service
          uri: lb://marketplace-user-service
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=1
        - id: marketplace-product-service
          uri: lb://marketplace-product-service
          predicates:
            - Path=/products/**
          filters:
            - StripPrefix=1
        - id: marketplace-order-service
          uri: lb://marketplace-order-service
          predicates:
            - Path=/orders/**
          filters:
            - StripPrefix=1
        - id: marketplace-payment-service
          uri: lb://marketplace-payment-service
          predicates:
            - Path=/payments/**
          filters:
            - StripPrefix=1
        - id: marketplace-notification-service
          uri: lb://marketplace-notification-service
          predicates:
            - Path=/notifications/**
          filters:
            - StripPrefix=1
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s
    discovery:
      locator:
        enabled: true
        lower-case-service-id: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_JWT_ISSUER_URI:http://keycloak:8080/realms/marketplace}
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
management:
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  metrics:
    tags:
      application: marketplace-api-gateway
logging:
  level:
    org.springframework.cloud.gateway: INFO
rate-limiter:
  redis:
    enabled: true
