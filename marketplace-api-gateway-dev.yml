spring:
  config:
    activate:
      on-profile: dev
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - name: Retry
              args:
                retries: 1
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
          httpclient:
            connect-timeout: 5000
            response-timeout: 10s
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_JWT_ISSUER_URI:http://localhost:9090/realms/marketplace}
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
