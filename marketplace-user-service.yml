server:
  port: 0
spring:
  application:
    name: marketplace-user-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${USER_DB_URL:jdbc:postgresql://localhost:5432/user_db}
    username: ${USER_DB_USERNAME:user_user}
    password: ${USER_DB_PASSWORD:user_pass}
    hikari:
      maximum-pool-size: ${USER_DB_MAX_POOL_SIZE:10}
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/marketplace}
  data:
    redis:
      repositories:
        enabled: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
logging:
  level:
    root: INFO
    io.github.rbnascimentoo.marketplace.user: INFO
user:
  avatar-storage:
    provider: local,s3
    bucket: ${USER_AVATAR_BUCKET:marketplace-user-avatars}
  default-roles:
    - ROLE_CUSTOMER
